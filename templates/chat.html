<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MyAI</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
		<link rel="stylesheet" href="../static/style/chat.css">
		<style>
		  /* ── File download card ─────────────────────────────────── */
		  .file-card {
		    display: inline-flex;
		    align-items: center;
		    gap: 10px;
		    margin-top: 10px;
		    padding: 10px 14px;
		    border: 1px solid var(--border, #333);
		    border-radius: 10px;
		    background: var(--surface, #1e1e1e);
		    color: inherit;
		    text-decoration: none;
		    font-size: 0.85rem;
		    max-width: 320px;
		    transition: background 0.15s, border-color 0.15s;
		    cursor: pointer;
		  }
		  .file-card:hover {
		    background: var(--surface-hover, #2a2a2a);
		    border-color: var(--accent, #2abfb0);
		  }
		  .file-card-icon { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }
		  .file-card-info {
		    display: flex;
		    flex-direction: column;
		    min-width: 0;
		    flex: 1;
		  }
		  .file-card-name {
		    font-weight: 500;
		    white-space: nowrap;
		    overflow: hidden;
		    text-overflow: ellipsis;
		  }
		  .file-card-meta {
		    font-size: 0.75rem;
		    opacity: 0.55;
		    margin-top: 2px;
		  }
		  .file-card-dl {
		    flex-shrink: 0;
		    opacity: 0.5;
		    transition: opacity 0.15s;
		  }
		  .file-card:hover .file-card-dl { opacity: 1; }
		  .file-card-dl svg {
		    width: 16px; height: 16px;
		    fill: none;
		    stroke: currentColor;
		    stroke-width: 1.75;
		  }
		  .bubble-attachment {
		    margin-top: 4px;
		    font-size: 0.78rem;
		    opacity: 0.65;
		  }
		  /* ── File attachment chips ───────────────────────────────── */
		  #attached-files-bar,
		  #pending-file-chip {
		    display: flex;
		    flex-wrap: wrap;
		    gap: 6px;
		    padding: 4px 0;
		  }
		  #pending-file-chip { display: inline-flex; }
		  .file-chip {
		    display: inline-flex;
		    align-items: center;
		    gap: 6px;
		    padding: 4px 10px;
		    border-radius: 20px;
		    background: var(--surface, #1e1e1e);
		    border: 1px solid var(--border, #333);
		    font-size: 0.78rem;
		    color: inherit;
		    max-width: 260px;
		    white-space: nowrap;
		    overflow: hidden;
		    text-overflow: ellipsis;
		  }
		  .file-chip.pending {
		    border-style: dashed;
		    opacity: 0.75;
		  }
		  .file-chip-remove {
		    background: none;
		    border: none;
		    cursor: pointer;
		    color: inherit;
		    opacity: 0.5;
		    padding: 0;
		    font-size: 0.7rem;
		    line-height: 1;
		    flex-shrink: 0;
		  }
		  .file-chip-remove:hover { opacity: 1; }

		  /* ── Thinking / thought bubble ──────────────────────────── */
		  .thinking-bubble {
		    display: inline-flex;
		    align-items: center;
		    gap: 4px;
		    font-size: 0.85rem;
		    opacity: 0.7;
		    font-style: italic;
		    background: transparent !important;
		    border: 1px dashed var(--border, #444) !important;
		    color: var(--text-muted, #888);
		    padding: 6px 16px 6px 14px;
		    border-radius: 12px;
		    min-width: 180px;
		    white-space: nowrap;
		    overflow: visible;
		  }
		  .thinking-dots {
		    display: inline-block;
		    min-width: 2ch;
		    width: auto;
		    font-style: normal;
		    letter-spacing: 2px;
		  }
		  .thought-bubble {
		    display: inline-flex;
		    align-items: center;
		    gap: 6px;
		    font-size: 0.8rem;
		    color: var(--text-muted, #888);
		    background: transparent !important;
		    border: none !important;
		    padding: 4px 0;
		    font-style: italic;
		    opacity: 1;
		    transition: opacity 0.6s ease;
		  }
		  .thought-icon {
		    width: 13px;
		    height: 13px;
		    opacity: 0.6;
		    flex-shrink: 0;
		  }
		  .thought-fade {
		    opacity: 0 !important;
		  }
		  /* Keep thought row compact — no full bubble padding */
		  #thinking-row .bubble {
		    box-shadow: none;
		  }

		  /* ── Sidebar search ─────────────────────────────────────── */
		  .sidebar-search {
		    display: flex;
		    align-items: center;
		    gap: 6px;
		    margin: 10px 12px 4px;
		    padding: 6px 10px;
		    border: 1px solid var(--border, #2a2a2a);
		    border-radius: 8px;
		    background: var(--bg, #111);
		    transition: border-color 0.15s;
			min-height: 38px;
		  }
		  .sidebar-search:focus-within {
		    border-color: var(--accent, #2abfb0);
		  }
		  .sidebar-search-icon {
		    width: 13px;
		    height: 13px;
		    flex-shrink: 0;
		    color: var(--text-muted, #666);
		  }
		  .sidebar-search input {
		    flex: 1;
		    background: none;
		    border: none;
		    outline: none;
		    font-size: 0.82rem;
		    color: var(--text-primary, #eee);
		    min-width: 0;
		  }
		  .sidebar-search input::placeholder {
		    color: var(--text-muted, #555);
		  }
		  .sidebar-search-clear {
		    display: none;
		    align-items: center;
		    justify-content: center;
		    background: none;
		    border: none;
		    cursor: pointer;
		    color: var(--text-muted, #666);
		    font-size: 0.65rem;
		    padding: 0;
		    line-height: 1;
		    flex-shrink: 0;
		    transition: color 0.15s;
		  }
		  .sidebar-search-clear:hover { color: var(--text-primary, #eee); }
		  .conv-search-empty {
		    padding: 16px 14px;
		    font-size: 0.8rem;
		    color: var(--text-muted, #666);
		    font-style: italic;
		  }
		  mark.search-highlight {
		    background: rgba(42, 191, 176, 0.25);
		    color: var(--accent, #2abfb0);
		    border-radius: 2px;
		    padding: 0 1px;
		  }
		</style>
		<link rel="icon" type="image/x-icon" href="../static/images/myai.ico">
		<script>
		  // Runs before <body> paints — prevents flash of wrong theme.
		  (function () {
		    var stored = localStorage.getItem('myai-theme');
		    var sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
		    var theme = (stored === 'light' || stored === 'dark') ? stored : sys;
		    document.documentElement.setAttribute('data-theme', theme);
		  })();
		</script>
		</head>
	<body>
		<div class="sidebar-overlay" id="sidebar-overlay"></div>
		<div class="app-layout">
			<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
			<aside class="sidebar" id="sidebar">
				<div class="sidebar-top sidebar-head">
					<button class="logo">
						<img src="/static/images/hdr_logo.svg"/><span class="sidebar-label">Chat History</span>
					</button>
					<button class="sidebar-collapse-btn" id="sidebar-collapse" title="Collapse sidebar" aria-expanded="true" aria-label="Collapse sidebar">
						<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
							<path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
						</svg>
					</button>
				</div>
				<div class="sidebar-top">
					<button class="new-chat-btn" id="new-chat-btn" title="New chat">
						<svg viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
							<path d="M7 1v12M1 7h12" stroke-linecap="round"/>
						</svg><span class="sidebar-label">New chat</span>
					</button>
				</div>
				<div class="sidebar-search">
					<svg class="sidebar-search-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="none">
						<circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
						<path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
					</svg>
					<input type="text" id="conv-search" placeholder="Search chats…" autocomplete="off" spellcheck="false"/>
					<button class="sidebar-search-clear" id="conv-search-clear" title="Clear search" aria-label="Clear search">✕</button>
				</div>
				<nav class="conv-list" id="conv-list">
				</nav>
				<div class="sidebar-top sidebar-foot">
					<a class="new-chat-btn" href="/memories" title="Memories">
						<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="none">
							<path d="M8 1.5a3 3 0 0 0-3 3v.2a2.5 2.5 0 0 0-1.5 2.3 2.5 2.5 0 0 0 .6 1.6A2.5 2.5 0 0 0 5 12a2.5 2.5 0 0 0 3 .9 2.5 2.5 0 0 0 3-.9 2.5 2.5 0 0 0 .9-3.4 2.5 2.5 0 0 0 .6-1.6A2.5 2.5 0 0 0 11 4.7v-.2a3 3 0 0 0-3-3zM8 1.5v11" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
						</svg><span class="sidebar-label">Memories</span>
					</a>
				</div>
			</aside>

			<!-- ── Main shell ────────────────────────────────────────────────────────── -->
			<div class="shell">
				<!-- Header -->
				<header>
					<button class="sidebar-toggle" id="sidebar-toggle" title="Toggle history">
						<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
							<path d="M2 4h12M2 8h12M2 12h12"/>
						</svg>
					</button>

					<div class="logo-wrap">
						<div class="logo-mark"><img src="/static/images/hdr_logo.svg"/></div>
						<span class="app-name">My<span>AI</span></span>
						<span id="user-label" style="font-size:0.75rem;color:var(--text-muted);margin-left:4px;"></span>
					</div>

					<div class="header-meta">
						<span class="status-dot">Inference: Local</span>
						<span class="model-badge">{{ model_name | default('Local Model') }}</span>

						<div class="theme-toggle" role="group" aria-label="Theme">
							<button id="theme-light" type="button" title="Light mode" aria-label="Light mode">
								<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
									<circle cx="12" cy="12" r="4"/>
									<path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
								</svg>
							</button>
							<button id="theme-system" type="button" title="System mode" aria-label="Follow system">
								<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
									<rect x="3" y="4" width="18" height="13" rx="2"/>
									<path d="M8 21h8M12 17v4"/>
								</svg>
							</button>
							<button id="theme-dark" type="button" title="Dark mode" aria-label="Dark mode">
								<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
									<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
								</svg>
							</button>
						</div>
					</div>
				</header>

				<!-- Context bar -->
				<div class="ctx-bar" id="ctx-bar" title="Context window usage">
					<span class="ctx-label">CTX</span>
					<div class="ctx-track"><div class="ctx-fill" id="ctx-fill"></div></div>
					<span id="ctx-pct">—</span>
					<span class="ctx-nums" id="ctx-nums">—</span>
				</div>

				<!-- Chat messages -->
				<div class="chat-area" id="chat"></div>

				<!-- Composer -->
				<div class="composer-wrap">
					<!-- File attachment preview bar (hidden until a file is chosen) -->
					<!-- Pending file chips — shown as files are chosen, cleared after send -->
					<div id="attachment-bar"
						style="display:none; flex-wrap:wrap; padding:6px 12px; gap:6px; border-top:1px solid var(--border);">
						<!-- chips injected here by JS -->
					</div>

					<div class="composer">
						<!-- Hidden file input -->
						<input type="file" id="file-input" style="display:none" accept=".txt,.md,.py,.js,.ts,.jsx,.tsx,.css,.html,.cs,.cpp,.c,.h,.java,.json,.yaml,.yml,.sh,.sql,.xml,.csv,.toml,.ini,.env,.pdf,.docx,.xlsx,.jpg,.jpeg,.png,.webp,.gif">

						<div class="composer-input-row">
							<textarea
								id="prompt-input"
								rows="1"
								placeholder="Type a message…"
								autocomplete="off"
								spellcheck="true"
							></textarea>
						</div>
						<div class="composer-toolbar">
							<button class="tool-btn" id="attach-btn" title="Attach file">
								<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
									<path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
										stroke-linecap="round" stroke-linejoin="round"/>
								</svg>
							</button>
							<button class="tool-btn" id="mic-btn" title="Click to speak">
								<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
									<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"
										stroke-linecap="round" stroke-linejoin="round"/>
									<path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"
										stroke-linecap="round" stroke-linejoin="round"/>
								</svg>
							</button>
							<div class="toolbar-spacer"></div>
							<button id="send-btn" title="Send (Enter)">
								<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
									<path d="M8 12V4M4 8l4-4 4 4" stroke="#fff" stroke-width="1.75"
										stroke-linecap="round" stroke-linejoin="round" fill="none"/>
								</svg>
							</button>
						</div>
					</div>
					<p class="composer-hint">Enter to send &nbsp;·&nbsp; Shift + Enter for new line</p>
				</div>
			</div><!-- /.shell -->
		</div><!-- /.app-layout -->

		<script>
		  // ── Theme toggle (light / system / dark) ──────────────────────────────
		  // localStorage value semantics:
		  //   'light'  — force light
		  //   'dark'   — force dark
		  //   missing  — follow the system preference
		  (function () {
		    const KEY = 'myai-theme';
		    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

		    const buttons = {
		      light:  document.getElementById('theme-light'),
		      system: document.getElementById('theme-system'),
		      dark:   document.getElementById('theme-dark'),
		    };

		    function apply(mode) {
		      // 'mode' is what the user picked: 'light', 'dark', or 'system'.
		      const concrete = (mode === 'system')
		        ? (mediaQuery.matches ? 'dark' : 'light')
		        : mode;
		      document.documentElement.setAttribute('data-theme', concrete);
		      Object.values(buttons).forEach(b => b.classList.remove('active'));
		      buttons[mode].classList.add('active');
		    }

		    function setMode(mode) {
		      if (mode === 'system') {
		        localStorage.removeItem(KEY);
		      } else {
		        localStorage.setItem(KEY, mode);
		      }
		      apply(mode);
		    }

		    // Initial state — match what the head-script already applied
		    const stored = localStorage.getItem(KEY);
		    const initial = (stored === 'light' || stored === 'dark') ? stored : 'system';
		    apply(initial);

		    buttons.light.addEventListener('click',  () => setMode('light'));
		    buttons.system.addEventListener('click', () => setMode('system'));
		    buttons.dark.addEventListener('click',   () => setMode('dark'));

		    // When in "system" mode, react to OS theme changes live
		    mediaQuery.addEventListener('change', () => {
		      if (!localStorage.getItem(KEY)) apply('system');
		    });
		  })();
		</script>
		<script src="../static/scripts/highlight.min.js"></script>
		<script src="../static/scripts/chat.js" defer></script>
	</body>
</html>
